name: android

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
    - uses: actions/checkout@v4

    - name: Install deps
      run: |
        sudo apt-get update
        sudo apt-get install -y --no-install-recommends gettext

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Generate debug keystore
      run: |
        keytool -genkey -v \
          -keystore debug.keystore \
          -alias androiddebugkey \
          -keyalg RSA \
          -keysize 2048 \
          -validity 10000 \
          -storepass android \
          -keypass android \
          -dname "CN=Android Debug,O=Android,C=US"
        cp debug.keystore android/

    - name: Create local.properties
      run: |
        echo "sdk.dir=$ANDROID_SDK_ROOT" > android/local.properties
        echo "keystore=../debug.keystore" >> android/local.properties
        echo "keystore.password=android" >> android/local.properties
        echo "key=androiddebugkey" >> android/local.properties
        echo "key.password=android" >> android/local.properties

    - name: Build APKs with Gradle
      run: cd android; chmod +x gradlew; ./gradlew assembleRelease

    - name: Save arm64 APK
      uses: actions/upload-artifact@v4
      with:
        name: cavegame-arm64.apk
        path: android/app/build/outputs/apk/release/app-arm64-v8a-release.apk

    - name: Save armeabi APK
      uses: actions/upload-artifact@v4
      with:
        name: cavegame-armeabi.apk
        path: android/app/build/outputs/apk/release/app-armeabi-v7a-release.apk
