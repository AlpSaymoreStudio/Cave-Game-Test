name: android

on:
  push:
    branches: [ main ]
    paths:
      - 'lib/**.[ch]'
      - 'lib/**.cpp'
      - 'src/**.[ch]'
      - 'src/**.cpp'
      - 'irr/**.[ch]'
      - 'irr/**.cpp'
      - '**/CMakeLists.txt'
      - 'cmake/Modules/**'
      - 'po/**.po'
      - 'android/**'
      - 'games/**'
      - '.github/workflows/android.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:

    - name: Checkout repo
      uses: actions/checkout@v4

    - name: Install deps
      run: |
        sudo apt-get update
        sudo apt-get install -y --no-install-recommends gettext

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    # gradle.properties pakai FreeMarker template (<#if isLowMemory>)
    # yang bikin Gradle error — replace dengan nilai fixed dulu
    - name: Fix gradle.properties
      run: |
        cat > android/gradle.properties << 'EOF'
        org.gradle.jvmargs=-Xmx4G -XX:+HeapDumpOnOutOfMemoryError
        org.gradle.daemon=true
        org.gradle.parallel=true
        org.gradle.configureondemand=true
        android.enableJetifier=false
        android.useAndroidX=true
        android.nonTransitiveRClass=false
        android.nonFinalResIds=false
        EOF

    - name: Generate debug keystore
      run: |
        keytool -genkey -v \
          -keystore debug.keystore \
          -alias androiddebugkey \
          -keyalg RSA \
          -keysize 2048 \
          -validity 10000 \
          -storepass android \
          -keypass android \
          -dname "CN=Android Debug,O=Android,C=US"
        cp debug.keystore android/

    - name: Create local.properties
      run: |
        echo "sdk.dir=$ANDROID_SDK_ROOT" > android/local.properties
        echo "keystore=../debug.keystore" >> android/local.properties
        echo "keystore.password=android" >> android/local.properties
        echo "key=androiddebugkey" >> android/local.properties
        echo "key.password=android" >> android/local.properties

    - name: Make gradlew executable
      run: chmod +x android/gradlew

    # bundleRelease dulu, assembleRelease jauh lebih cepat setelahnya
    - name: Build AAB
      run: cd android && ./gradlew bundleRelease

    - name: Build APKs
      run: cd android && ./gradlew assembleRelease

    - name: Upload AAB
      uses: actions/upload-artifact@v4
      with:
        name: cavegame-release.aab
        path: android/app/build/outputs/bundle/release/app-release.aab

    - name: Upload arm64 APK
      uses: actions/upload-artifact@v4
      with:
        name: cavegame-arm64-v8a.apk
        path: android/app/build/outputs/apk/release/app-arm64-v8a-release.apk

    - name: Upload armeabi APK
      uses: actions/upload-artifact@v4
      with:
        name: cavegame-armeabi-v7a.apk
        path: android/app/build/outputs/apk/release/app-armeabi-v7a-release.apk

    - name: Upload x86 APK
      uses: actions/upload-artifact@v4
      with:
        name: cavegame-x86.apk
        path: android/app/build/outputs/apk/release/app-x86-release.apk

    - name: Upload x86_64 APK
      uses: actions/upload-artifact@v4
      with:
        name: cavegame-x86_64.apk
        path: android/app/build/outputs/apk/release/app-x86_64-release.apk
