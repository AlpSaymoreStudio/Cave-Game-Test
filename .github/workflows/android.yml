name: android

on:
  push:
    branches: [ main ]
    paths:
      - 'lib/**.[ch]'
      - 'lib/**.cpp'
      - 'src/**.[ch]'
      - 'src/**.cpp'
      - 'irr/**.[ch]'
      - 'irr/**.cpp'
      - '**/CMakeLists.txt'
      - 'cmake/Modules/**'
      - 'po/**.po'
      - 'android/**'
      - 'games/**'
      - '.github/workflows/android.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 120
    steps:

    - name: Checkout repo
      uses: actions/checkout@v4

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y --no-install-recommends gettext ninja-build

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Set up Android SDK
      uses: android-actions/setup-android@v3

    - name: Install Android packages
      run: |
        sdkmanager "platforms;android-35" "build-tools;35.0.0" "ndk;29.0.14206865" "cmake;3.22.1"

    - name: Set up Gradle
      uses: gradle/actions/setup-gradle@v4

    - name: Generate debug keystore
      run: |
        keytool -genkey -v \
          -keystore debug.keystore \
          -alias androiddebugkey \
          -keyalg RSA \
          -keysize 2048 \
          -validity 10000 \
          -storepass android \
          -keypass android \
          -dname "CN=Android Debug,O=Android,C=US"
        cp debug.keystore android/

    - name: Create local.properties
      run: |
        echo "sdk.dir=$ANDROID_SDK_ROOT" > android/local.properties
        echo "keystore=../debug.keystore" >> android/local.properties
        echo "keystore.password=android" >> android/local.properties
        echo "key=androiddebugkey" >> android/local.properties
        echo "key.password=android" >> android/local.properties

    - name: Make gradlew executable
      run: chmod +x android/gradlew

    - name: Build AAB
      run: cd android && ./gradlew bundleRelease

    - name: Build APKs
      run: cd android && ./gradlew assembleRelease

    - name: Upload AAB
      uses: actions/upload-artifact@v4
      with:
        name: cavegame-release.aab
        path: android/app/build/outputs/bundle/release/app-release.aab

    - name: Upload release APKs
      uses: actions/upload-artifact@v4
      with:
        name: cavegame-release-apks
        path: android/app/build/outputs/apk/release/*.apk
